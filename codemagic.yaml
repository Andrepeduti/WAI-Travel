workflows:
  ios-workflow:
    name: iOS Capacitor Build to TestFlight
    integrations:
      app_store_connect: "WAI-Travel"
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Web App
        script: npm run build
      - name: Update Capacitor iOS
        script: npx cap sync ios
      - name: Inicializar Keychain
        script: keychain initialize
      - name: Buscar ou Criar Certificados e Perfis na Apple
        script: |
          app-store-connect fetch-signing-files "com.waitravel.app" \
            --type IOS_APP_STORE \
            --create
      - name: Adicionar Certificados ao Keychain
        script: keychain add-certificates
      - name: Aplicar Perfis no Projeto do Xcode
        script: xcode-project use-profiles
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration # Requer a integração do App Store Connect configurada na UI do Codemagic
        submit_to_testflight: true
        # beta_groups: 
        #   - Tester Group